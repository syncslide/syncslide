{% extends "base.html" %}

{% block title %}Watch Recording: {{ recording.name }}{% endblock title %}

{% block js %}
<script defer src="/js/play.js"></script>
<link rel="stylesheet" href="/css/katex.css">
{% endblock js %}

{% block content %}
<section aria-labelledby="video">
<details open>
<summary id="video">Video</summary>
<video id="myVideo" width="640" height="360" controls playsinline data-rid="{{ recording.id }}" data-recording-name="{{ recording.name }}">
<source src="/assets/{{ recording.id }}/{{ recording.video_path }}">
<track id="syncslide-data" default class="syncslide-data" kind="metadata" src="/assets/{{ recording.id }}/{{ recording.vtt_path }}" srclang="en" label="SyncSlide Data"/>
<track default kind="captions" src="/assets/{{ recording.id }}/{{ recording.captions_path }}" srclang="en" label="Captions"/>
Your browser does not support the video tag.
</video>
<label for="playbackRate">Playback Speed: </label>
<select id="rate">
<option value="0.5">0.5x</option>
<option value="0.75">0.75x</option>
<option value="1" selected>1x</option>
<option value="1.25">1.25x</option>
<option value="1.5">1.5x</option>
<option value="1.75">1.75x</option>
<option value="2">2x</option>
</select>
</details>
</section>
<main>
<section aria-live="polite" id="currentSlide"></section>
<nav aria-label="Slide Navigation">
<label for="goTo">Go to slide:</label>
<select id="goTo" name="goTo"></select>
<button id="go">Go</button
</nav>
{% if is_owner %}
<section aria-labelledby="cue-editor-heading">
<details>
<summary id="cue-editor-heading">Edit Presentation</summary>
<label>Presentation title: <input type="text" id="presTitle"></label>
<label><input type="checkbox" id="shiftSubsequent"> Shift subsequent cues when editing a timestamp</label>
<table>
<thead><tr><th>Slide</th><th>Title</th><th>Start Time (seconds)</th><th>Actions</th></tr></thead>
<tbody id="cueTableBody"></tbody>
</table>
<button id="saveVtt" type="button">Save</button>
<button id="cancelVtt" type="button">Cancel</button>
<button id="downloadVtt" type="button">Download VTT</button>
</details>
</section>
{% endif %}
{% endblock content %}
