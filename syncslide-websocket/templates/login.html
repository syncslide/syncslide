{% extends "nav.html" %}
{% block title %}Login{% endblock title %}

{% block breadcrumb %}<nav aria-label="Breadcrumb"><ol><li><a href="/">Home</a></li><li aria-current="page">Login</li></ol></nav>{% endblock breadcrumb %}
{% block content %}
<h1>Login</h1>
{% if error %}<p role="alert">{{ error }}</p>{% endif %}
<form method="POST" action="/auth/login">
<label for="uname">Username</label>
<input type="text" id="uname" name="username" required>
<label for="pwd">Password</label>
<input type="password" id="pwd" name="password" required>
<button type="button" id="toggle-pwd" aria-controls="pwd">
<svg aria-hidden="true" focusable="false" width="16" height="16" viewBox="0 0 16 16" id="toggle-pwd-icon">
<path d="M1 8s2.5-5 7-5 7 5 7 5-2.5 5-7 5-7-5-7-5z" fill="none" stroke="currentColor" stroke-width="1.5"/>
<circle cx="8" cy="8" r="2" fill="none" stroke="currentColor" stroke-width="1.5"/>
</svg>
<span id="toggle-pwd-label">Show password</span>
</button>
<button type="submit">Login</button>
</form>
<script>
(function () {
  var btn = document.getElementById('toggle-pwd');
  var input = document.getElementById('pwd');
  var label = document.getElementById('toggle-pwd-label');
  var icon = document.getElementById('toggle-pwd-icon');
  var hiddenPath = '<line x1="2" y1="2" x2="14" y2="14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>';
  btn.addEventListener('click', function () {
    var showing = input.type === 'text';
    input.type = showing ? 'password' : 'text';
    label.textContent = showing ? 'Show password' : 'Hide password';
    if (showing) {
      icon.querySelector('line') && icon.querySelector('line').remove();
    } else {
      icon.insertAdjacentHTML('beforeend', hiddenPath);
    }
  });
}());
</script>
{% endblock content %}
