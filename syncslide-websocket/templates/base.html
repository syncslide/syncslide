<!DOCTYPE html>
<html lang="en"><head>
{% block head %}
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta charset="utf-8" />
<title>{% block title %}{% endblock title %} - SyncSlide</title>
<link rel="stylesheet" href="/css/style.css">
{% block js %}{% endblock js %}
{% endblock head %}
</head><body>
<script>document.addEventListener('DOMContentLoaded',()=>{document.querySelectorAll('a[href^="http"]').forEach(a=>{const s=document.createElement('span');s.className='ext-label';s.textContent='(external)';a.appendChild(s);});});</script>
{% block nav %}{% endblock nav %}
{% block breadcrumb %}{% endblock breadcrumb %}
{% block content %}{% endblock content %}
{% block footer %}{% endblock footer %}
</body></html>
